name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run lint
        run: python -m ruff check .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          {
            echo "VPS_HOST=$VPS_HOST"
            echo "VPS_USER=$VPS_USER"
          } >> "$GITHUB_ENV"

      - name: Deploy on VPS
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          QUESTION_BANK_RUNTIME_PORT: ${{ vars.QUESTION_BANK_RUNTIME_PORT || '8000' }}
        run: |
          set -euo pipefail
          ssh "$VPS_USER@$VPS_HOST" "cd '$VPS_APP_DIR' \
            && git fetch origin main \
            && git checkout main \
            && git pull --ff-only origin main \
            && docker compose up -d --build --remove-orphans \
            && curl -fsS http://127.0.0.1:${QUESTION_BANK_RUNTIME_PORT:-8000}/health"
